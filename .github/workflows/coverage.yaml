name: Coverage
permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
jobs:
  init:
    runs-on: ubuntu-24.04
    outputs:
      needs-init: ${{ steps.check.outputs.needs-init }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Check if initialization is needed
        id: check
        run: |
          if test -f "ext/.gitkeep" && test "$(cat "ext/.gitkeep")" = "pskel_uninitialized"; then
            echo "needs-init=true" >> $GITHUB_OUTPUT
          else
            echo "needs-init=false" >> $GITHUB_OUTPUT
          fi
      - name: Initialize extension
        if: steps.check.outputs.needs-init == 'true'
        run: |
          docker compose run -v"$(pwd)/ext:/ext" --rm shell pskel init example
      - name: Upload initialized extension
        if: steps.check.outputs.needs-init == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: initialized-ext-coverage
          path: ext/
          retention-days: 1
  linux:
    strategy:
      matrix:
        runs-on: ['ubuntu-24.04', 'ubuntu-24.04-arm']
        version: ['8.4']
        type: ['cli', 'zts']
        distro: ['trixie']
    needs: init
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Build container
        run: |
          docker compose build --pull --no-cache --build-arg IMAGE="php" --build-arg TAG="${{ matrix.version }}-${{ matrix.type }}-${{ matrix.distro }}"
      - name: Test with gcov
        run: |
          docker compose run -v "$(pwd)/ext:/ext" --rm shell pskel coverage
  coverage:
    needs: [linux, init]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true
      - name: Download initialized extension
        if: needs.init.outputs.needs-init == 'true'
        uses: actions/download-artifact@v5
        with:
          name: initialized-ext-coverage
          path: ext/
      - name: Download coverage artifacts
        uses: actions/download-artifact@v5
        with:
          path: /ext
      - name: Install lcov
        run: sudo apt-get install -y lcov
      - name: Merge coverages
        run: |
          LCOV_FILES=$(find /ext -name "lcov.info" -type f)

          if test -z "${LCOV_FILES}"; then
            echo "No lcov.info files found in the artifacts!"
            exit 1
          fi

          CMD="lcov"
          CMD+=" --ignore-errors format"
          for LCOV_FILE in ${LCOV_FILES}; do
            echo "Adding coverage file: ${LCOV_FILE}"
            CMD+=" -a ${LCOV_FILE}"
          done
          CMD+=" -o lcov.info"

          echo "Executing: ${CMD}"
          eval "${CMD}"

          if test ! -f "lcov.info"; then
            echo "Failed to generate merged lcov.info file!"
            exit 1
          fi

          echo "Successfully merged $(echo ${LCOV_FILES} | wc -w) coverage files."
      - name: Report coverage
        uses: k1LoW/octocov-action@73d561f65d59e66899ed5c87e4621a913b5d5c20 # v1.5.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config: ".github/octocov.yml"
      - name: Generate HTML coverage report
        run: |
          genhtml "lcov.info" --output-directory "coverage-html" --prefix "/"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "coverage-html"
  Deploy:
    if: github.ref == 'refs/heads/main'
    needs: coverage
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
